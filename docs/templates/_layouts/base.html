<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="AframeXR Python: library for declarative 3D visualization in Python with interactive charts and VR support.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | AframeXR Python</title>
  <link rel="icon" href="{{ base_url }}static/imgs/logo.png" type="image/png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color: darkOrange;">

  <!-- Logo -->
  <a href="{{ base_url }}index.html" class="d-flex align-items-center">
    <img src="{{ base_url }}static/imgs/logo.png" alt="AFrameXR Logo" height="60">
  </a>
  <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Menu -->
  <div class="collapse navbar-collapse" id="navbarContent">
    <div class="navbar-nav gap-lg-4 h5 d-lg-flex w-100 justify-content-center">
      <a href="{{ base_url }}get_started/index.html" class="nav-link text-light">Get started</a>
      <a href="{{ base_url }}examples/index.html" class="nav-link text-light">Examples</a>
      <a href="{{ base_url }}user_guide/user-guide.html" class="nav-link text-light">User guide</a>
      <a href="{{ base_url }}user_guide/api.html" class="nav-link text-light">API</a>
      <a href="{{ base_url }}about.html" class="nav-link text-light">About</a>
    </div>

    <!-- Link icons -->
    <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0 ms-lg-auto">
      <a href="https://github.com/davidlab20/TFG" class="text-light fs-3">
        <i class="bi bi-github"></i>
      </a>
    </div>
  </div>

</nav>

<main class="container-fluid">
  {% block content %}{% endblock %}
</main>

<!-- Copyright footer -->
<footer class="bg-dark text-white py-3">
  <div class="col-auto ms-5">
    <p class="text-start fw-bold">
      <i>&copy;</i> Copyright 2025-2026, David Díaz.
    </p>
  </div>
</footer>

</body>
</html>
