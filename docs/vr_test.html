<!DOCTYPE html>
<html lang="en">
<head>
  <title>VR Scene</title>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.0/dist/aframe-environment-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/davidlab20/TFG@v0.7.1/docs/scripts/main.min.js"></script>
	<script>
		AFRAME.registerComponent('simple-drag', {
			init() {
				this.grabbed = null;
				this.hovered = null;
				this.offset = new THREE.Vector3();

				this.el.addEventListener('raycaster-intersection', e => {
					this.hovered = e.detail.els.find(el => el.classList.contains('movable') && el.hasAttribute('data-raycastable')) || null;
				});

				this.el.addEventListener('raycaster-intersection-cleared', () => {
					this.hovered = null;
				});

				this.el.addEventListener('selectstart', () => {
					if (!this.hovered) return;
					this.grabbed = this.hovered;

					const controllerWorldPos = new THREE.Vector3();
					this.el.object3D.getWorldPosition(controllerWorldPos);

					const objectWorldPos = new THREE.Vector3();
					this.grabbed.object3D.getWorldPosition(objectWorldPos);

					this.offset.copy(objectWorldPos).sub(controllerWorldPos);
				});

				this.el.addEventListener('selectend', () => {
					this.grabbed = null;
				});
			},

			tick() {
				if (!this.grabbed) return;

				const controllerWorldPos = new THREE.Vector3();
				this.el.object3D.getWorldPosition(controllerWorldPos);

				this.grabbed.object3D.position.copy(controllerWorldPos.clone().add(this.offset));
			}
		});
	</script>
</head>
<body>
  <a-scene cursor="rayOrigin: mouse" raycaster="objects: [data-raycastable], .movable" simple-drag
           webxr="optionalFeatures: local-floor">
    <a-entity id="user" movement-controls="speed: 0.1">

      <!-- Camera -->
      <a-camera id="camera" position="0 1.6 0" active="true" wasd-controls="acceleration: 15"></a-camera>

      <!-- VR controllers -->
      <a-entity laser-controls="hand: right" raycaster="objects: [data-raycastable]"
                line="color: yellow; opacity: 0.8">
      </a-entity>

      <a-entity laser-controls="hand: left" raycaster="objects: .movable" simple-drag
                line="color: yellow; opacity: 0.8">
      </a-entity>
    </a-entity>

      <a-text id="HUD-text" align="center"></a-text>
    </a-entity>

    <!-- Environment -->
    <a-entity environment="preset: default"></a-entity>
